<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthHub 2026 | Ultimate Finance Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { border-left: 4px solid #10b981; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 flex h-screen overflow-hidden transition-colors">

    <nav class="w-72 bg-indigo-950 dark:bg-black text-white flex flex-col p-6 shadow-2xl">
        <h1 class="text-2xl font-black mb-10 tracking-tighter italic">WEALTH HUB <span class="text-emerald-400">2026</span></h1>
        <div class="space-y-2 flex-1">
            <button onclick="showTab('sip')" class="nav-btn w-full text-left p-3 rounded-xl hover:bg-white/10 active" id="btn-sip">📈 SIP Calculator</button>
            <button onclick="showTab('emi')" class="nav-btn w-full text-left p-3 rounded-xl hover:bg-white/10" id="btn-emi">🏠 EMI / Mortgage</button>
        </div>
        <div class="pt-6 border-t border-white/10 space-y-4 text-sm">
            <button onclick="toggleDarkMode()" class="w-full bg-slate-800 p-3 rounded-xl flex justify-between items-center">
                <span>Theme</span><span id="theme-icon">🌙</span>
            </button>
            <button onclick="downloadPDF()" class="w-full bg-emerald-500 p-3 rounded-xl font-bold">Export Report (PDF)</button>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-12">
        <div id="sip" class="tab-content active space-y-8">
            <div class="flex justify-between items-start">
                <h2 class="text-4xl font-black">SIP Engine</h2>
                <div class="text-right">
                    <p class="text-xs font-bold text-indigo-500 uppercase">Tax Savings (80C)</p>
                    <h3 class="text-2xl font-black" id="sip_tax">₹0</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-xl space-y-6">
                    <div>
                        <label class="flex justify-between text-sm">Monthly Investment <b>₹<span id="v_sip_p">25000</span></b></label>
                        <input type="range" id="sip_p" min="1000" max="200000" step="1000" value="25000" class="w-full accent-indigo-600">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold text-slate-400">Tax Slab</label>
                            <select id="taxSlab" class="w-full bg-slate-100 dark:bg-slate-800 p-2 rounded-lg mt-1">
                                <option value="5">5%</option><option value="20">20%</option><option value="30" selected>30%</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400">Inflation %</label>
                            <input type="number" id="inflation" value="6" class="w-full bg-slate-100 dark:bg-slate-800 p-2 rounded-lg mt-1">
                        </div>
                    </div>
                    <button onclick="calculateSip()" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold">Calculate Growth</button>
                </div>

                <div class="flex flex-col items-center">
                    <canvas id="sipChart" class="max-w-[280px]"></canvas>
                    <div class="mt-6 text-center">
                        <p class="text-sm text-slate-400">Maturity Value</p>
                        <h4 class="text-5xl font-black text-indigo-600" id="sip_res">₹0</h4>
                        <p class="text-xs text-slate-500 mt-2">Inflation Adjusted: <span id="sip_real" class="font-bold">₹0</span></p>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-3xl overflow-hidden shadow-sm border dark:border-slate-800">
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50 dark:bg-slate-800">
                        <tr><th class="p-4">Year</th><th class="p-4">Invested</th><th class="p-4">Returns</th><th class="p-4">Total</th></tr>
                    </thead>
                    <tbody id="breakdown_body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let sipChart;
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
        }

        async function calculateSip() {
            const params = {
                type: 'sip',
                p: document.getElementById('sip_p').value,
                r: 12, // Assume 12% for example
                t: 10, // Assume 10 years
                taxSlab: document.getElementById('taxSlab').value,
                inflation: document.getElementById('inflation').value
            };
            document.getElementById('v_sip_p').innerText = Number(params.p).toLocaleString();

            const res = await fetch('/api/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(params)
            });
            const data = await res.json();
            
            document.getElementById('sip_res').innerText = "₹" + Number(data.value).toLocaleString('en-IN');
            document.getElementById('sip_real').innerText = "₹" + Number(data.inflationAdjustedValue).toLocaleString('en-IN');
            document.getElementById('sip_tax').innerText = "₹" + data.taxSaved.toLocaleString('en-IN');
            
            updateTable(params.p, 12, 10);
            renderChart([data.invested, data.earnings]);
        }

        function updateTable(p, r, t) {
            let html = "";
            for(let i = 1; i <= t; i++) {
                const inv = p * 12 * i;
                const val = p * (((Math.pow(1 + (r/1200), i*12) - 1) / (r/1200)) * (1 + (r/1200)));
                html += `<tr class="border-t dark:border-slate-800"><td class="p-4">Year ${i}</td><td class="p-4">₹${Math.round(inv).toLocaleString()}</td><td class="p-4 text-emerald-500">+₹${Math.round(val-inv).toLocaleString()}</td><td class="p-4 font-bold">₹${Math.round(val).toLocaleString()}</td></tr>`;
            }
            document.getElementById('breakdown_body').innerHTML = html;
        }

        function renderChart(data) {
            if(sipChart) sipChart.destroy();
            sipChart = new Chart(document.getElementById('sipChart'), {
                type: 'doughnut',
                data: { labels: ['Invested', 'Earnings'], datasets: [{ data, backgroundColor: ['#e2e8f0', '#4f46e5'], borderWeight: 0 }] },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }

        window.onload = () => {
            if(localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
            calculateSip();
        };
    </script>
</body>
</html>
