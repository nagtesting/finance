name: MoneyVeda Daily Signal Generator

on:
  schedule:
    # Runs at 10:15 UTC = 3:45 PM IST, Monday to Friday
    - cron: '15 10 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub

jobs:
  run-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask flask-cors supabase python-dotenv yfinance requests beautifulsoup4 nse

      - name: Run filing scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python filing_scraper.py

      - name: Run signal engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python signal_engine.py
